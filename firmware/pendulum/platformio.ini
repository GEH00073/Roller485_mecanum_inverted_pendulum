; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3]
; platform = espressif32
platform = espressif32@6.10.0
board = m5stack-atoms3
framework = arduino
build_flags =
	-D WIFI_SSID=\"\"
	-D WIFI_PASSWORD=\"\"
	-D OTA_HOSTNAME=\"roller485-mecanum-inverted-pendulum\"
	; -D OTA_PASSWORD=\"your_ota_password\"
monitor_speed = 115200
lib_deps = 
	m5stack/M5Unified@^0.2.17
	arduino-libraries/Servo@^1.2.2

[env:m5stack-atoms3-ota]
extends = env:m5stack-atoms3
upload_protocol = espota
upload_port = roller485-mecanum-inverted-pendulum.local
; If OTA_PASSWORD is set, enable this too:
; upload_flags =
; 	--auth=your_ota_password
