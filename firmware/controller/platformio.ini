; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3]
platform = espressif32@6.10.0
board = m5stack-atoms3
framework = arduino
build_flags =
	-D WIFI_SSID=\"\"
	-D WIFI_PASSWORD=\"\"
	-D OTA_HOSTNAME=\"roller485-mecanum-inverted-pendulum-joy\"
	; -D OTA_PASSWORD=\"your_ota_password\"
lib_deps = fastled/FastLED@3.9.1

[env:m5stack-atoms3-ota]
extends = env:m5stack-atoms3
upload_protocol = espota
upload_port = roller485-mecanum-inverted-pendulum-joy.local
; If OTA_PASSWORD is set, enable this too:
; upload_flags =
; 	--auth=your_ota_password
